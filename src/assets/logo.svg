<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="50" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  
  <!-- Medical cross -->
  <rect x="52" y="35" width="16" height="50" rx="2" fill="white"/>
  <rect x="35" y="52" width="50" height="16" rx="2" fill="white"/>
  
  <!-- Heart symbol overlay -->
  <path d="M45 45 C45 40, 50 38, 55 42 C60 38, 65 40, 65 45 C65 50, 55 60, 55 60 C55 60, 45 50, 45 45 Z" fill="#ef4444" opacity="0.8"/>
  
  <!-- Text -->
  <text x="130" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">PHC</text>
  <text x="130" y="70" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">PRIMARY HEALTH</text>
  <text x="130" y="90" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">CENTRE</text>
  
  <!-- Decorative elements -->
  <circle cx="25" cy="25" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="275" cy="95" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="285" cy="25" r="2.5" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Subtle gradient overlay for modern look -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="300" height="120" fill="url(#logoGradient)" rx="10"/>
</svg>